<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tichiera Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&family=Lemon&display=swap"rel="stylesheet">
    <link rel="stylesheet" href="Login.css">

</head>

<body>

    <div id="atas">
        <nav>Tichiera</nav>
    </div>

    <div class="login-container">

        <div class="login-left">
            <div class="left-content">
                <h1>Tichiera</h1>
                <p>Platform terbaik untuk pembelian<br>tiket online.</p>
            </div>
        </div>


        <div class="login-right">
            <h2>LOGIN</h2>
            <form>
                <input type="text" placeholder="username / no. telepon / email">
                <input type="password" placeholder="password">
                <button>LOGIN SEKARANG</button>
                <a href="#">Lupa Password</a>
            </form>

            <div class="divider">
                <span>ATAU</span>
            </div>

            <div class="social">
                    <button class="btn-social">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="#3b5998"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg>
                        FACEBOOK
                    </button>
                    <button class="btn-social">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        GOOGLE
                    </button>
                </div>

            <p class="daftar">Belum punya akun? <b>Daftar</b></p>

        </div>

    </div>

</body>

</html>
